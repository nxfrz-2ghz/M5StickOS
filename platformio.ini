[platformio]
default_envs = m5stickcplus2

[env:m5stickcplus2]
platform = espressif32 @ 6.6.0
board = m5stick-c
framework = arduino
monitor_speed = 115200
src_dir = .
lib_ldf_mode = chain
build_flags = -std=c++17
lib_dirs = .platformio/libdeps/m5stickcplus2
lib_deps =
  M5StickCPlus2
  IRremote
lib_ignore = DFRobot_GP8XXX
